<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Debug Logs — {{ mosque.displayName }}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background: #1a1a2e; color: #e0e0e0; }
    .navbar-brand { font-weight: 700; }
    #logOutput {
      font-family: 'Courier New', monospace;
      font-size: .78rem;
      background: #0d0d1a;
      color: #a8d8a8;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 300px;
      max-height: 78vh;
      overflow-y: auto;
    }
    .btn-toolbar .btn { min-width: 100px; }
    #statusBar { font-size: .8rem; color: #aaa; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-lg">
    <a class="navbar-brand text-decoration-none text-white" href="{{ mosque.manageBase }}">&#8592; Dashboard</a>
    <div class="d-flex gap-2">
      <a href="{{ mosque.liveSite }}" class="btn btn-outline-light btn-sm" target="_blank">View Live &#8599;</a>
    </div>
  </div>
</nav>

<div class="container-lg">

  <div class="alert alert-warning py-2 mb-3">
    &#128274; <strong>Local mode only.</strong>
    Logs are stored in <code>logs/debug.log</code> on the server disk and are only accessible from localhost.
    They are <strong>never</strong> collected in production.
  </div>

  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="btn-toolbar gap-2">
      <button class="btn btn-sm btn-outline-light" onclick="loadLogs()">&#8635; Refresh</button>
      <button class="btn btn-sm btn-outline-warning" onclick="downloadLogs()">&#8681; Download .txt</button>
      <button class="btn btn-sm btn-outline-danger" onclick="clearLogs()">&#10005; Clear</button>
    </div>
    <span id="statusBar">Loading…</span>
  </div>

  <div id="logOutput">Loading…</div>

</div>

<script>
const API = '{{ mosque.apiBase }}api/debug-log';
let _rawLog = '';

async function loadLogs() {
  document.getElementById('statusBar').textContent = 'Refreshing…';
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _rawLog = await r.text();
    const el = document.getElementById('logOutput');
    el.textContent = _rawLog || '(log file is empty)';
    // Auto-scroll to bottom
    el.scrollTop = el.scrollHeight;
    const lines = _rawLog ? _rawLog.split('\n').filter(Boolean).length : 0;
    document.getElementById('statusBar').textContent = lines + ' line(s) — last refreshed ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('logOutput').textContent = 'Error loading logs: ' + e.message;
    document.getElementById('statusBar').textContent = 'Error';
  }
}

async function clearLogs() {
  if (!confirm('Clear the entire debug log file?')) return;
  try {
    await fetch(API, { method: 'DELETE' });
    _rawLog = '';
    document.getElementById('logOutput').textContent = '(log cleared)';
    document.getElementById('statusBar').textContent = 'Cleared at ' + new Date().toLocaleTimeString();
  } catch (e) {
    alert('Could not clear: ' + e.message);
  }
}

function downloadLogs() {
  const blob = new Blob([_rawLog], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'debug_' + new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-') + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

// Auto-refresh every 5 s while page is open
loadLogs();
setInterval(loadLogs, 5000);
</script>
</body>
</html>
